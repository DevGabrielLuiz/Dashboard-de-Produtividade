<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdutiVibe - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">ProdutiVibe</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 mb-4">
                <div class="card shadow-sm p-4">
                    <h5 class="card-title border-bottom pb-2">Fluxo de Produtividade</h5>
                    <p id="status" class="text-primary fw-bold">Conectando ao servidor...</p>
                    
                    <div class="input-group mb-3">
                        <input type="text" id="input-tarefa" class="form-control" placeholder="Nova tarefa...">
                       <button class="btn btn-primary" id="btn-adicionar">Adicionar</button>
                    </div>

                    <ul id="lista-tarefas" class="list-group list-group-flush">
                        {% for tarefa in tarefas %}
                            <li class="list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2" id="tarefa-{{ tarefa.id }}">
                                {{ tarefa.conteudo }}
                                <button class="btn btn-sm btn-outline-danger" onclick="deletarTarefa({{ tarefa.id }})">
                                    &times;
                                </button>
                            </li>
                        {% endfor %}
                        </ul>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm p-4 text-center bg-white">
                    <h6 class="text-muted text-uppercase small">Tarefas Concluídas</h6>
                    <h1 class="display-3 fw-bold text-primary" id="contador">{{total}}</h1>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    let socket;

    // Função global para que o 'onclick' do HTML a encontre
    function deletarTarefa(id) {
        if (confirm("Deseja excluir esta tarefa?")) {
            // O nome aqui deve ser igual ao @socketio.on do Python
            socket.emit('excluir_tarefa', { id: id });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        socket = io();
        const btnAdicionar = document.getElementById('btn-adicionar');
        const statusElement = document.getElementById('status');

        socket.on('connect', () => {
            if (statusElement) {
                statusElement.innerText = "● Servidor Online";
                statusElement.classList.replace('text-primary', 'text-success');
            }
        });

        // ESCUTAR: Nova tarefa adicionada
        socket.on('atualizar_front', (data) => {
            const contador = document.getElementById('contador');
            if (contador) contador.innerText = data.total;

            const lista = document.getElementById('lista-tarefas');
            if (lista) {
                const novoItem = document.createElement('li');
                // IMPORTANTE: Definir o ID para poder remover depois
                novoItem.id = `tarefa-${data.id}`; 
                novoItem.className = "list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2";
                novoItem.innerHTML = `
                    ${data.conteudo}
                    <button class="btn btn-sm btn-outline-danger" onclick="deletarTarefa(${data.id})">&times;</button>
                `;
                lista.prepend(novoItem);
            }
        });

        // ESCUTAR: Tarefa removida
        socket.on('remover_da_tela', (data) => {
            const elemento = document.getElementById(`tarefa-${data.id}`);
            if (elemento) elemento.remove();
            
            const contador = document.getElementById('contador');
            if (contador) contador.innerText = data.total;
        });

        if (btnAdicionar) {
            btnAdicionar.onclick = function() {
                const input = document.getElementById('input-tarefa');
                if (input && input.value.trim() !== "") {
                    socket.emit('nova_tarefa', { conteudo: input.value });
                    input.value = '';
                }
            };
        }
    });
</script>
</html>
