<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdutiVibe - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">ProdutiVibe</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 mb-4">
                <div class="card shadow-sm p-4">
                    <h5 class="card-title border-bottom pb-2">Fluxo de Produtividade</h5>
                    <p id="status" class="text-primary fw-bold">Conectando ao servidor...</p>
                    
                    <div class="input-group mb-3">
                        <input type="text" id="input-tarefa" class="form-control" placeholder="Nova tarefa...">
                        <button class="btn btn-primary" onclick="enviarTarefa()">Adicionar</button>
                    </div>

                    <ul id="lista-tarefas" class="list-group list-group-flush">
                        {% for tarefa in tarefas %}
                            <li class="list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2">
                                {{ tarefa.conteudo }}
                            </li>
                        {% endfor %}
                        </ul>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm p-4 text-center bg-white">
                    <h6 class="text-muted text-uppercase small">Tarefas Concluídas</h6>
                    <h1 class="display-3 fw-bold text-primary" id="contador">{{total}}</h1>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.0.1/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('status').innerText = "● Servidor Online";
            document.getElementById('status').classList.replace('text-primary', 'text-success');
        });

        // ÚNICA função para ENVIAR dados ao Python
        function enviarTarefa() {
            const input = document.getElementById('input-tarefa');
            if (input.value.trim() !== "") {
                socket.emit('nova_tarefa', { conteudo: input.value });
                input.value = '';
            }
        }

        // ÚNICA função para RECEBER dados do Python
        socket.on('atualizar_front', (data) => {
            // Atualiza o contador
            document.getElementById('contador').innerText = data.total;

            // Adiciona na lista
            const lista = document.getElementById('lista-tarefas');
            const novoItem = document.createElement('li');
            novoItem.className = "list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2";
            novoItem.innerText = data.conteudo;
            lista.prepend(novoItem);
        });
    </script>
</body>
</html>
